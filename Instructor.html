<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Instructor Portal – TWI Bible College</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900&family=Lato:wght@300;400;700&family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --emerald: #2d7a5f; --sage: #5aad8a; --mint: #a8d5c2;
      --forest: #071410; --dark: #0b1a13; --panel: #0f2219;
      --surface: #142d1f; --text: #dff0e8; --muted: #7aaa92;
      --border: rgba(90,173,138,0.18); --glow: rgba(45,122,95,0.28);
      --error: #f87171; --warn: #fbbf24; --info: #60a5fa;
    }
    html, body { min-height: 100vh; }
    body { font-family: 'Lato', sans-serif; background: var(--dark); color: var(--text); }

    /* ══════════════════════════════
       LOGIN
    ══════════════════════════════ */
    #loginBox {
      min-height: 100vh; display: flex;
      align-items: center; justify-content: center; padding: 2rem;
      background:
        radial-gradient(ellipse 70% 55% at 20% 80%, rgba(45,122,95,0.18) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 80% 15%, rgba(90,173,138,0.09) 0%, transparent 55%),
        var(--dark);
    }
    .login-card {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 16px; padding: 3rem 2.5rem;
      width: 100%; max-width: 420px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.5);
    }
    .login-brand { text-align: center; margin-bottom: 2.5rem; }
    .login-badge {
      width: 62px; height: 62px; border-radius: 14px;
      background: linear-gradient(145deg, var(--emerald), var(--sage));
      display: flex; align-items: center; justify-content: center;
      font-family: 'Cinzel', serif; font-size: 1.4rem; font-weight: 700;
      color: #fff; margin: 0 auto 1rem;
      box-shadow: 0 6px 24px var(--glow);
    }
    .login-brand h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem; font-weight: 700; color: #fff; margin-bottom: 0.3rem;
    }
    .login-brand p {
      font-family: 'Cinzel', serif; font-size: 0.58rem;
      letter-spacing: 0.2em; color: var(--muted); text-transform: uppercase;
    }
    .login-divider {
      width: 52px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--emerald), transparent);
      margin: 1rem auto;
    }
    .login-hint {
      font-size: 0.75rem; color: var(--muted); text-align: center;
      margin-top: 1rem; font-style: italic;
    }

    /* Fields */
    .field { margin-bottom: 1.3rem; }
    .field label {
      font-family: 'Cinzel', serif; font-size: 0.58rem;
      letter-spacing: 0.18em; color: var(--sage); text-transform: uppercase;
      display: block; margin-bottom: 0.5rem;
    }
    .field-wrap { position: relative; }
    .field input {
      width: 100%; background: var(--surface); border: 1px solid var(--border);
      border-radius: 7px; color: var(--text);
      font-family: 'Lato', sans-serif; font-size: 0.93rem;
      padding: 0.78rem 1rem; transition: border-color 0.2s, box-shadow 0.2s;
    }
    .field input::placeholder { color: var(--muted); opacity: 0.5; }
    .field input:focus { outline: none; border-color: var(--sage); box-shadow: 0 0 0 3px rgba(90,173,138,0.15); }
    .toggle-eye {
      position: absolute; right: 0.9rem; top: 50%;
      transform: translateY(-50%); cursor: pointer; font-size: 1rem; user-select: none;
    }

    /* Buttons */
    .btn-primary {
      font-family: 'Cinzel', serif; font-size: 0.72rem; font-weight: 700;
      letter-spacing: 0.16em; text-transform: uppercase;
      background: linear-gradient(135deg, var(--emerald), var(--sage));
      color: #fff; border: none; cursor: pointer;
      padding: 0.9rem 2rem; border-radius: 7px; width: 100%;
      box-shadow: 0 5px 22px rgba(45,122,95,0.38);
      transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
    }
    .btn-primary:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 10px 32px rgba(45,122,95,0.52); }
    .btn-primary:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }

    /* Portal buttons */
    .pbtn {
      font-family: 'Cinzel', serif; font-size: 0.62rem; font-weight: 700;
      letter-spacing: 0.13em; text-transform: uppercase;
      border: none; cursor: pointer; border-radius: 6px;
      padding: 0.6rem 1.2rem; display: inline-flex;
      align-items: center; gap: 0.4rem; white-space: nowrap;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
    }
    .pbtn:hover:not(:disabled) { transform: translateY(-1px); }
    .pbtn:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }
    .pbtn-green  { background: linear-gradient(135deg, var(--emerald), var(--sage)); color: #fff; box-shadow: 0 3px 14px rgba(45,122,95,0.3); }
    .pbtn-green:hover:not(:disabled) { box-shadow: 0 6px 22px rgba(45,122,95,0.48); }
    .pbtn-grey   { background: rgba(122,170,146,0.12); color: var(--muted); border: 1px solid var(--border); }
    .pbtn-grey:hover:not(:disabled) { background: rgba(122,170,146,0.2); color: var(--mint); }
    .pbtn-danger { background: rgba(248,113,113,0.12); color: var(--error); border: 1px solid rgba(248,113,113,0.25); }
    .pbtn-danger:hover:not(:disabled) { background: rgba(248,113,113,0.22); }
    .pbtn-saved  { background: rgba(248,113,113,0.1) !important; color: var(--error) !important; border: 1px solid rgba(248,113,113,0.25) !important; cursor: not-allowed !important; transform: none !important; }

    /* Alerts */
    .alert { border-radius: 7px; padding: 0.85rem 1.1rem; font-size: 0.86rem; line-height: 1.65; margin-bottom: 1.2rem; display: none; }
    .alert.show { display: block; }
    .alert.success { background: rgba(45,122,95,0.14); border: 1px solid rgba(90,173,138,0.3); color: var(--mint); }
    .alert.error   { background: rgba(248,113,113,0.09); border: 1px solid rgba(248,113,113,0.25); color: var(--error); }
    .alert.info    { background: rgba(96,165,250,0.09); border: 1px solid rgba(96,165,250,0.2); color: var(--info); }

    /* Spinner */
    .loading { display: none; align-items: center; gap: 0.7rem; margin: 0.5rem 0; }
    .loading.show { display: flex; }
    .spinner {
      width: 18px; height: 18px; border-radius: 50%;
      border: 2px solid var(--border); border-top-color: var(--sage);
      animation: spin 0.8s linear infinite; flex-shrink: 0;
    }
    .loading-label { font-family: 'Cinzel', serif; font-size: 0.6rem; letter-spacing: 0.18em; color: var(--muted); text-transform: uppercase; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ══════════════════════════════
       PORTAL
    ══════════════════════════════ */
    #portal { display: none; }

    /* Top bar */
    .topbar {
      position: sticky; top: 0; z-index: 200;
      background: rgba(7,20,16,0.97); border-bottom: 1px solid var(--border);
      backdrop-filter: blur(16px); height: 66px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 2rem;
    }
    .topbar-left { display: flex; align-items: center; gap: 0.9rem; }
    .topbar-badge {
      width: 40px; height: 40px; border-radius: 10px; flex-shrink: 0;
      background: linear-gradient(145deg, var(--emerald), var(--sage));
      display: flex; align-items: center; justify-content: center;
      font-family: 'Cinzel', serif; font-size: 0.9rem; font-weight: 700;
      color: #fff; box-shadow: 0 3px 12px var(--glow);
    }
    .topbar-info strong { font-family: 'Cinzel', serif; font-size: 0.8rem; font-weight: 600; color: var(--mint); display: block; }
    .topbar-info span { font-family: 'Cinzel', serif; font-size: 0.56rem; letter-spacing: 0.16em; color: var(--muted); text-transform: uppercase; }
    .topbar-right { display: flex; align-items: center; gap: 0.8rem; flex-wrap: wrap; }
    .topbar-instructor { text-align: right; }
    .topbar-instructor #whoami { font-family: 'Playfair Display', serif; font-size: 0.95rem; font-weight: 700; color: #fff; display: block; }
    .topbar-instructor #semLabel { font-family: 'Cinzel', serif; font-size: 0.54rem; letter-spacing: 0.14em; color: var(--muted); text-transform: uppercase; }

    /* Portal body */
    .portal-body { max-width: 1200px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

    /* Stats bar */
    .stats-bar {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 1rem;
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 10px; padding: 1.2rem 1.8rem; margin-bottom: 1.5rem;
    }
    .stats-left { display: flex; align-items: center; gap: 1rem; }
    .stats-icon {
      width: 44px; height: 44px; border-radius: 10px; flex-shrink: 0;
      background: linear-gradient(135deg, var(--emerald), var(--sage));
      display: flex; align-items: center; justify-content: center; font-size: 1.2rem;
    }
    .stats-label strong { font-family: 'Playfair Display', serif; font-size: 1rem; color: #fff; display: block; }
    .stats-label span { font-family: 'Cinzel', serif; font-size: 0.56rem; letter-spacing: 0.16em; color: var(--muted); text-transform: uppercase; }
    .subj-pill {
      font-family: 'Cinzel', serif; font-size: 0.62rem; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
      background: rgba(45,122,95,0.18); border: 1px solid rgba(90,173,138,0.3);
      color: var(--mint); padding: 0.35rem 1rem; border-radius: 999px;
    }

    /* Subject tabs */
    .tabs-wrap {
      display: none; overflow-x: auto; white-space: nowrap;
      padding-bottom: 0.5rem; margin-bottom: 1.5rem;
      scrollbar-width: thin; scrollbar-color: var(--emerald) transparent;
    }
    .tabs-wrap::-webkit-scrollbar { height: 4px; }
    .tabs-wrap::-webkit-scrollbar-thumb { background: var(--emerald); border-radius: 2px; }
    .sub-tab {
      display: inline-flex; flex-direction: column; align-items: flex-start;
      gap: 0.15rem; padding: 0.75rem 1.2rem; margin-right: 0.6rem;
      border-radius: 8px; cursor: pointer;
      background: var(--panel); border: 1px solid var(--border);
      transition: border-color 0.2s, background 0.2s;
    }
    .sub-tab:hover { border-color: rgba(90,173,138,0.4); background: var(--surface); }
    .sub-tab.active {
      background: linear-gradient(135deg, var(--emerald), rgba(90,173,138,0.8));
      border-color: transparent;
      box-shadow: 0 4px 16px rgba(45,122,95,0.35);
    }
    .sub-tab-name { font-family: 'Cinzel', serif; font-size: 0.68rem; font-weight: 700; letter-spacing: 0.1em; color: var(--mint); text-transform: uppercase; }
    .sub-tab.active .sub-tab-name { color: #fff; }
    .sub-tab-meta { font-size: 0.72rem; color: var(--muted); }
    .sub-tab.active .sub-tab-meta { color: rgba(255,255,255,0.75); }

    /* Subject panel */
    .subject-panel {
      display: none; background: var(--panel);
      border: 1px solid var(--border); border-radius: 12px; overflow: hidden;
    }
    .subject-head {
      padding: 1.4rem 1.8rem; background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between;
      align-items: flex-start; gap: 1rem; flex-wrap: wrap;
    }
    .subject-head-left {}
    #panelTitle {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem; font-weight: 700; color: #fff; margin-bottom: 0.3rem;
    }
    #panelMeta { font-size: 0.82rem; color: var(--muted); line-height: 1.6; }
    .panel-meta-item { display: inline-flex; align-items: center; gap: 0.3rem; margin-right: 1rem; }
    .panel-meta-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--emerald); flex-shrink: 0; }
    .subject-head-actions { display: flex; gap: 0.6rem; flex-wrap: wrap; align-items: center; }

    /* Grade table */
    .table-wrap { overflow-x: auto; }
    .grade-table { width: 100%; border-collapse: collapse; }

    /* Filter header row */
    .grade-table thead.filter-head th {
      background: var(--surface); padding: 0.8rem 1rem;
      border-bottom: 1px solid var(--border);
    }
    .mini-filter {
      width: 100%; background: var(--dark); border: 1px solid var(--border);
      border-radius: 6px; color: var(--text);
      font-family: 'Lato', sans-serif; font-size: 0.82rem;
      padding: 0.5rem 0.75rem; transition: border-color 0.2s;
    }
    .mini-filter::placeholder { color: var(--muted); opacity: 0.6; }
    .mini-filter:focus { outline: none; border-color: var(--sage); }

    /* Data rows */
    .grade-table tbody tr { transition: background 0.12s; }
    .grade-table tbody tr:hover td { background: rgba(90,173,138,0.04); }
    .grade-table tbody td {
      padding: 0.85rem 1rem; font-size: 0.87rem;
      color: rgba(223,240,232,0.85); white-space: nowrap;
      border-bottom: 1px solid var(--border); vertical-align: middle;
    }
    .grade-table tbody td:first-child { font-family: 'Cinzel', serif; font-size: 0.72rem; color: var(--mint); letter-spacing: 0.06em; }
    .grade-table tbody td:nth-child(2) { color: var(--text); font-weight: 500; }
    .grade-table tbody .empty-row td { text-align: center; padding: 2.5rem; color: var(--muted); font-style: italic; }

    /* Grade / remarks inputs */
    .grade-input, .remarks-input {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 6px; color: var(--text);
      font-family: 'Lato', sans-serif; font-size: 0.87rem;
      padding: 0.5rem 0.75rem; transition: border-color 0.2s, box-shadow 0.2s;
    }
    .grade-input { width: 100px; }
    .remarks-input { width: 200px; }
    .grade-input:focus, .remarks-input:focus { outline: none; border-color: var(--sage); box-shadow: 0 0 0 2px rgba(90,173,138,0.15); }
    .grade-input.locked, .remarks-input.locked {
      background: rgba(7,20,16,0.5) !important; border-color: rgba(90,173,138,0.08) !important;
      color: var(--muted) !important; cursor: not-allowed;
    }

    /* Responsive */
    @media (max-width: 700px) {
      .topbar { padding: 0 1rem; }
      .portal-body { padding: 1rem 1rem 3rem; }
      .topbar-instructor { display: none; }
      .subject-head { flex-direction: column; }
    }
  </style>
</head>
<body>

  <!-- ══════════════════════════════
       LOGIN
  ══════════════════════════════ -->
  <div id="loginBox">
    <div class="login-card">
      <div class="login-brand">
        <div class="login-badge">T</div>
        <h1>Instructor Portal</h1>
        <p>Thy Word International Bible College · Bataan</p>
        <div class="login-divider"></div>
      </div>

      <div id="loginMsg" class="alert"></div>

      <div class="field">
        <label>Username</label>
        <input type="text" id="instUser" autocomplete="username" placeholder="Your instructor username">
      </div>

      <div class="field">
        <label>Password</label>
        <div class="field-wrap">
          <input type="password" id="instPass" autocomplete="current-password" placeholder="Your password" style="padding-right:2.8rem;">
          <span id="togglePass" class="toggle-eye" title="Show/Hide">👁️</span>
        </div>
      </div>

      <button id="loginBtn" class="btn-primary" onclick="loginInstructor()">Log In to Portal</button>
      <p class="login-hint">Contact admin for your username and password.</p>
    </div>
  </div>

  <!-- ══════════════════════════════
       PORTAL
  ══════════════════════════════ -->
  <div id="portal">

    <!-- Top bar -->
    <div class="topbar">
      <div class="topbar-left">
        <div class="topbar-badge">T</div>
        <div class="topbar-info">
          <strong>TWI Bible College</strong>
          <span>Instructor Portal</span>
        </div>
      </div>
      <div class="topbar-right">
        <div class="topbar-instructor">
          <span id="whoami">Welcome</span>
          <span id="semLabel">Semester: —</span>
        </div>
        <button class="pbtn pbtn-grey" onclick="reloadAll()">⟳ Refresh</button>
        <button class="pbtn pbtn-danger" onclick="logout()">Log Out</button>
      </div>
    </div>

    <div class="portal-body">

      <div id="mainMsg" class="alert"></div>

      <!-- Stats bar -->
      <div class="stats-bar">
        <div class="stats-left">
          <div class="stats-icon">📚</div>
          <div class="stats-label">
            <strong>Subjects Handled</strong>
            <span>Columns E–Z of the Instructors Sheet</span>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:1rem;">
          <div id="pageLoading" class="loading">
            <div class="spinner"></div>
            <span class="loading-label">Loading data…</span>
          </div>
          <span class="subj-pill" id="subjectCountPill">0 subject(s)</span>
        </div>
      </div>

      <!-- Subject tabs -->
      <div id="tabsWrap" class="tabs-wrap"></div>

      <!-- Subject panel -->
      <div id="subjectPanel" class="subject-panel">

        <div class="subject-head">
          <div class="subject-head-left">
            <div id="panelTitle">Subject</div>
            <div id="panelMeta"></div>
          </div>
          <div class="subject-head-actions">
            <button class="pbtn pbtn-grey" onclick="loadStudentsForActive()">Load Students</button>
            <button id="saveAllBtn" class="pbtn pbtn-green" onclick="saveGradesForActive()">Save All Grades</button>
          </div>
        </div>

        <div class="table-wrap">
          <table class="grade-table">
            <thead class="filter-head">
              <tr>
                <th><input id="mfSid"     class="mini-filter" type="text" placeholder="🔍 Student ID"   oninput="filterTable()"/></th>
                <th><input id="mfName"    class="mini-filter" type="text" placeholder="🔍 Student Name" oninput="filterTable()"/></th>
                <th><input id="mfGrade"   class="mini-filter" type="text" placeholder="🔍 Grade"        oninput="filterTable()"/></th>
                <th><input id="mfRemarks" class="mini-filter" type="text" placeholder="🔍 Remarks"      oninput="filterTable()"/></th>
                <th style="text-align:right;">
                  <button class="pbtn pbtn-grey" style="font-size:0.58rem;" onclick="clearMiniFilters()">Clear</button>
                </th>
              </tr>
            </thead>
            <tbody id="studentsTbody">
              <tr class="empty-row"><td colspan="5">Select a subject tab to begin.</td></tr>
            </tbody>
          </table>
        </div>

      </div><!-- /subject-panel -->

    </div><!-- /portal-body -->
  </div><!-- /portal -->

  <script>
    let instructorSession = null;
    let currentSemester = '';
    let subjectsCache = [];
    let activeSubject = null;

    /* ── MESSAGES ── */
    function showMsg(elId, text, type){
      const el = document.getElementById(elId);
      el.className = 'alert ' + type + ' show';
      el.textContent = text;
      setTimeout(() => el.classList.remove('show'), 6000);
    }

    /* ── LOADING ── */
    function setLoading(on){
      const el = document.getElementById('pageLoading');
      if(on) el.classList.add('show'); else el.classList.remove('show');
    }

    /* ── PASSWORD TOGGLE ── */
    document.getElementById('togglePass').addEventListener('click', function(){
      const inp = document.getElementById('instPass');
      if(inp.type === 'password'){ inp.type = 'text'; this.textContent = '🙈'; }
      else { inp.type = 'password'; this.textContent = '👁️'; }
    });

    /* ══════════════════════════════
       LOGIN
    ══════════════════════════════ */
    function loginInstructor(){
      const username = (document.getElementById('instUser').value || '').trim();
      const password = (document.getElementById('instPass').value || '').trim();
      if(!username || !password){
        showMsg('loginMsg', 'Please enter username and password.', 'error'); return;
      }
      const btn = document.getElementById('loginBtn');
      btn.disabled = true; btn.textContent = 'Logging in…';

      google.script.run
        .withSuccessHandler(res => {
          btn.disabled = false; btn.textContent = 'Log In to Portal';
          if(res && res.success){
            instructorSession = { username: res.username, fullName: res.fullName };
            document.getElementById('loginBox').style.display = 'none';
            document.getElementById('portal').style.display = 'block';
            document.getElementById('whoami').textContent = 'Welcome, ' + res.fullName;
            reloadAll();
          } else {
            showMsg('loginMsg', (res && res.message) ? res.message : 'Login failed.', 'error');
          }
        })
        .withFailureHandler(err => {
          btn.disabled = false; btn.textContent = 'Log In to Portal';
          showMsg('loginMsg', 'Error: ' + err.message, 'error');
        })
        .checkInstructorLogin(username, password);
    }

    /* ══════════════════════════════
       LOGOUT
    ══════════════════════════════ */
    function logout(){
      instructorSession = null; currentSemester = ''; subjectsCache = []; activeSubject = null;
      document.getElementById('portal').style.display = 'none';
      document.getElementById('loginBox').style.display = 'flex';
      document.getElementById('instPass').value = '';
      document.getElementById('tabsWrap').style.display = 'none';
      document.getElementById('tabsWrap').innerHTML = '';
      document.getElementById('subjectPanel').style.display = 'none';
      document.getElementById('studentsTbody').innerHTML = `<tr class="empty-row"><td colspan="5">Select a subject tab to begin.</td></tr>`;
      document.getElementById('subjectCountPill').textContent = '0 subject(s)';
      document.getElementById('semLabel').textContent = 'Semester: —';
      setLoading(false); clearMiniFilters();
    }

    /* ══════════════════════════════
       RELOAD ALL
    ══════════════════════════════ */
    function reloadAll(){
      if(!instructorSession) return;
      setLoading(true);
      document.getElementById('tabsWrap').style.display = 'none';
      document.getElementById('tabsWrap').innerHTML = '';
      document.getElementById('subjectPanel').style.display = 'none';
      document.getElementById('studentsTbody').innerHTML = `<tr class="empty-row"><td colspan="5">Loading…</td></tr>`;
      clearMiniFilters();

      google.script.run
        .withSuccessHandler(semRes => {
          currentSemester = (semRes && semRes.currentSemester) ? semRes.currentSemester : '';
          document.getElementById('semLabel').textContent = 'Semester: ' + (currentSemester || '(not set)');

          google.script.run
            .withSuccessHandler(res => {
              setLoading(false);
              if(res && res.success){
                subjectsCache = res.subjects || [];
                document.getElementById('subjectCountPill').textContent = subjectsCache.length + ' subject(s)';
                renderTabs(subjectsCache);
                if(subjectsCache.length){ setActiveSubject(subjectsCache[0]); }
                else { showMsg('mainMsg', 'No subjects found for this instructor or matching current semester.', 'info'); }
              } else {
                showMsg('mainMsg', (res && res.message) ? res.message : 'Unable to load subjects.', 'error');
              }
            })
            .withFailureHandler(err => { setLoading(false); showMsg('mainMsg', 'Error: ' + err.message, 'error'); })
            .getInstructorSubjects(instructorSession.username);
        })
        .withFailureHandler(() => {
          google.script.run
            .withSuccessHandler(res => {
              setLoading(false);
              if(res && res.success){
                subjectsCache = res.subjects || [];
                document.getElementById('subjectCountPill').textContent = subjectsCache.length + ' subject(s)';
                renderTabs(subjectsCache);
                if(subjectsCache.length) setActiveSubject(subjectsCache[0]);
              } else {
                showMsg('mainMsg', (res && res.message) ? res.message : 'Unable to load subjects.', 'error');
              }
            })
            .withFailureHandler(err => { setLoading(false); showMsg('mainMsg', 'Error: ' + err.message, 'error'); })
            .getInstructorSubjects(instructorSession.username);
        })
        .getCurrentSemester();
    }

    /* ══════════════════════════════
       TABS
    ══════════════════════════════ */
    function renderTabs(subjects){
      const wrap = document.getElementById('tabsWrap');
      wrap.innerHTML = '';
      if(!subjects || !subjects.length) return;
      wrap.style.display = 'block';
      subjects.forEach(s => {
        const tab = document.createElement('div');
        tab.className = 'sub-tab';
        tab.innerHTML = `<span class="sub-tab-name">${escapeHtml(s.subject || '')}</span><span class="sub-tab-meta">${escapeHtml(s.yearLevel || '')}</span>`;
        tab.onclick = () => setActiveSubject(s);
        wrap.appendChild(tab);
      });
    }

    function setActiveSubject(s){
      activeSubject = s;
      Array.from(document.getElementById('tabsWrap').querySelectorAll('.sub-tab'))
        .forEach(t => t.classList.toggle('active', t.querySelector('.sub-tab-name')?.textContent === String(s.subject || '')));

      document.getElementById('subjectPanel').style.display = 'block';
      document.getElementById('panelTitle').textContent = s.subject || '';
      document.getElementById('panelMeta').innerHTML =
        `<span class="panel-meta-item"><span class="panel-meta-dot"></span>Day: ${escapeHtml(s.day || '—')}</span>` +
        `<span class="panel-meta-item"><span class="panel-meta-dot"></span>Time: ${escapeHtml(s.from || '')}–${escapeHtml(s.to || '')}</span>` +
        `<span class="panel-meta-item"><span class="panel-meta-dot"></span>Semester: ${escapeHtml(s.semester || '—')}</span>` +
        `<span class="panel-meta-item"><span class="panel-meta-dot"></span>Year Level: ${escapeHtml(s.yearLevel || '—')}</span>`;

      document.getElementById('studentsTbody').innerHTML =
        `<tr class="empty-row"><td colspan="5">Click "Load Students" to show enrolled students.</td></tr>`;
      clearMiniFilters();
    }

    /* ══════════════════════════════
       FILTER
    ══════════════════════════════ */
    function getMiniFilters(){
      return {
        sid:     (document.getElementById('mfSid')?.value     || '').toLowerCase().trim(),
        name:    (document.getElementById('mfName')?.value    || '').toLowerCase().trim(),
        grade:   (document.getElementById('mfGrade')?.value   || '').toLowerCase().trim(),
        remarks: (document.getElementById('mfRemarks')?.value || '').toLowerCase().trim(),
      };
    }
    function filterTable(){
      const f = getMiniFilters();
      Array.from(document.getElementById('studentsTbody').querySelectorAll('tr')).forEach(r => {
        const sid = (r.dataset.studentId || '').toLowerCase();
        if(!sid) return;
        const name    = (r.dataset.studentName || '').toLowerCase();
        const grade   = (r.querySelector('.grade-input')?.value   || '').toLowerCase();
        const remarks = (r.querySelector('.remarks-input')?.value || '').toLowerCase();
        r.style.display = (
          (!f.sid     || sid.includes(f.sid))     &&
          (!f.name    || name.includes(f.name))   &&
          (!f.grade   || grade.includes(f.grade)) &&
          (!f.remarks || remarks.includes(f.remarks))
        ) ? '' : 'none';
      });
    }
    function clearMiniFilters(){
      ['mfSid','mfName','mfGrade','mfRemarks'].forEach(id => { const el = document.getElementById(id); if(el) el.value = ''; });
      filterTable();
    }

    /* ══════════════════════════════
       LOAD STUDENTS
    ══════════════════════════════ */
    function loadStudentsForActive(){
      if(!instructorSession || !activeSubject) return;
      const subjectName = String(activeSubject.subject || '').trim();
      const semester    = String(activeSubject.semester || currentSemester || '').trim();
      const tbody = document.getElementById('studentsTbody');
      tbody.innerHTML = `<tr class="empty-row"><td colspan="5">Loading students…</td></tr>`;

      google.script.run
        .withSuccessHandler(res => {
          if(!res || !res.success){
            tbody.innerHTML = `<tr class="empty-row"><td colspan="5" style="color:var(--error);">${escapeHtml((res && res.message) ? res.message : 'Unable to load enrolled students.')}</td></tr>`;
            return;
          }
          const students = res.students || [];
          if(!students.length){
            tbody.innerHTML = `<tr class="empty-row"><td colspan="5">No enrolled students found for this subject/semester.</td></tr>`;
            return;
          }
          tbody.innerHTML = '';
          students.forEach(st => {
            const tr = document.createElement('tr');
            tr.dataset.studentId   = st.studentId   || '';
            tr.dataset.studentName = st.studentName || '';
            tr.dataset.locked      = st.locked ? '1' : '0';
            const locked = !!st.locked;
            tr.innerHTML = `
              <td>${escapeHtml(st.studentId || '')}</td>
              <td>${escapeHtml(st.studentName || '')}</td>
              <td><input class="grade-input${locked ? ' locked' : ''}"   type="text" value="${escapeAttr(st.grade   || '')}" ${locked ? 'disabled' : ''} oninput="filterTable()"/></td>
              <td><input class="remarks-input${locked ? ' locked' : ''}" type="text" value="${escapeAttr(st.remarks || '')}" ${locked ? 'disabled' : ''} oninput="filterTable()"/></td>
              <td>${locked
                ? `<button class="pbtn pbtn-saved" disabled>✓ Saved</button>`
                : `<button class="pbtn pbtn-green" style="font-size:0.6rem;" onclick="saveSingleRow(this)">Save</button>`
              }</td>`;
            tbody.appendChild(tr);
          });
          clearMiniFilters();
          showMsg('mainMsg', 'Loaded ' + students.length + ' student(s).', 'success');
        })
        .withFailureHandler(err => {
          tbody.innerHTML = `<tr class="empty-row"><td colspan="5" style="color:var(--error);">Error: ${escapeHtml(err.message)}</td></tr>`;
        })
        .getEnrolledStudentsForSubject(instructorSession.username, subjectName, semester);
    }

    /* ══════════════════════════════
       SAVE HELPERS
    ══════════════════════════════ */
    function collectGrades(){
      const payload = [];
      Array.from(document.getElementById('studentsTbody').querySelectorAll('tr')).forEach(r => {
        const sid = r.dataset.studentId;
        if(!sid || r.dataset.locked === '1') return;
        payload.push({
          studentId:   sid,
          studentName: r.dataset.studentName || '',
          grade:       (r.querySelector('.grade-input')?.value   || '').trim(),
          remarks:     (r.querySelector('.remarks-input')?.value || '').trim(),
        });
      });
      return payload;
    }

    function markRowSaved(tr){
      if(!tr) return;
      tr.dataset.locked = '1';
      const gi = tr.querySelector('.grade-input');
      const ri = tr.querySelector('.remarks-input');
      if(gi){ gi.setAttribute('disabled','disabled'); gi.classList.add('locked'); }
      if(ri){ ri.setAttribute('disabled','disabled'); ri.classList.add('locked'); }
      const btn = tr.querySelector('button');
      if(btn){ btn.textContent = '✓ Saved'; btn.className = 'pbtn pbtn-saved'; btn.disabled = true; }
    }

    function saveGradesForActive(){
      if(!instructorSession || !activeSubject) return;
      const payload = collectGrades();
      if(!payload.length){ showMsg('mainMsg', 'No editable rows to save.', 'info'); return; }
      const subjectName = String(activeSubject.subject  || '').trim();
      const semester    = String(activeSubject.semester || currentSemester || '').trim();
      const btn = document.getElementById('saveAllBtn');
      btn.disabled = true; const old = btn.textContent; btn.textContent = 'Saving…';

      google.script.run
        .withSuccessHandler(res => {
          btn.disabled = false; btn.textContent = old;
          if(res && res.success){
            const resultMap = new Map((res.results || []).map(x => [String(x.studentId || ''), x.status]));
            Array.from(document.getElementById('studentsTbody').querySelectorAll('tr')).forEach(r => {
              const sid = r.dataset.studentId;
              if(!sid) return;
              const st = resultMap.get(String(sid));
              if(st === 'saved' || st === 'locked') markRowSaved(r);
            });
            filterTable();
            showMsg('mainMsg', res.message || 'Grades saved.', 'success');
          } else {
            showMsg('mainMsg', (res && res.message) ? res.message : 'Save failed.', 'error');
          }
        })
        .withFailureHandler(err => { btn.disabled = false; btn.textContent = old; showMsg('mainMsg', 'Error: ' + err.message, 'error'); })
        .saveGrades(instructorSession.username, semester, subjectName, payload);
    }

    function saveSingleRow(btn){
      if(!instructorSession || !activeSubject) return;
      const tr = btn.closest('tr');
      if(!tr || tr.dataset.locked === '1') return;
      const sid     = tr.dataset.studentId   || '';
      const name    = tr.dataset.studentName || '';
      const grade   = (tr.querySelector('.grade-input')?.value   || '').trim();
      const remarks = (tr.querySelector('.remarks-input')?.value || '').trim();
      const subjectName = String(activeSubject.subject  || '').trim();
      const semester    = String(activeSubject.semester || currentSemester || '').trim();
      btn.disabled = true; const old = btn.textContent; btn.textContent = 'Saving…';

      google.script.run
        .withSuccessHandler(res => {
          if(res && res.success){
            const st = (res.results || []).find(x => String(x.studentId) === String(sid));
            const status = st ? st.status : 'saved';
            if(status === 'saved' || status === 'locked'){
              markRowSaved(tr); filterTable();
              showMsg('mainMsg', 'Saved grade for ' + name + '.', 'success');
            } else {
              btn.disabled = false; btn.textContent = old;
              showMsg('mainMsg', 'Not saved: ' + (st?.reason || 'Unknown'), 'info');
            }
          } else {
            btn.disabled = false; btn.textContent = old;
            showMsg('mainMsg', (res && res.message) ? res.message : 'Save failed.', 'error');
          }
        })
        .withFailureHandler(err => { btn.disabled = false; btn.textContent = old; showMsg('mainMsg', 'Error: ' + err.message, 'error'); })
        .saveGrades(instructorSession.username, semester, subjectName, [{ studentId: sid, studentName: name, grade, remarks }]);
    }

    /* ══════════════════════════════
       UTILS
    ══════════════════════════════ */
    function escapeHtml(str){
      return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }
    function escapeAttr(str){ return escapeHtml(str).replace(/"/g,'&quot;'); }
  </script>
</body>
</html>
